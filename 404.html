    <style>
        body {
            background: #050505;
            color: #f1f5f9;
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .notfound-wrap {
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .notfound-code {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(96px, 20vw, 180px);
            line-height: 1;
            color: #38bdf8;
            letter-spacing: -0.04em;
        }
        .notfound-msg {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .notfound-back {
            display: inline-block;
            padding: 12px 22px;
            border: 1px solid rgba(56,189,248,0.4);
            background: rgba(56,189,248,0.12);
            color: #f1f5f9;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s, border-color 0.2s;
        }
        .notfound-back:hover {
            background: rgba(56,189,248,0.22);
            border-color: #38bdf8;
        }
    </style>
